# Single-source configs that don't merit their own file: each entry names its own
# provider (the file name "custom" is not a provider). Multi-tenant board lists
# (greenhouse.yml, gem.yml, …) keep their own per-provider files.

# Ashby boards whose public Posting API is disabled (served via the embed GraphQL adapter).
- company: Chainlink Labs
  provider: ashbygraphql
  board: chainlink-labs
- company: Toggl
  provider: ashbygraphql
  board: toggl
- company: Whatnot
  provider: ashbygraphql
  board: whatnot

# International single-company sources.
# 2GIS (job.2gis.ru) tarpits datacenter IPs, so it was dropped in #660; it egresses through
# the residential proxy now (proxiedProviders), which the tarpit is served past in ~2s.
- company: 2GIS
  provider: 2gis
- company: Uber
  provider: uber
- company: Amazon
  provider: amazon
- company: Google
  provider: google
- company: Meta
  provider: meta
# Apple (provider: apple) lives in its own sources/apple.yml on a daily cron slot: its
# per-posting detail fan-out makes a full crawl ~30 min, too slow to share this hourly
# custom slot (it would block the small providers below and overrun the hour).
- company: Lumenalta
  provider: lumenalta
- company: Telegram
  provider: telegramcareers

- company: VK
  provider: vk
- company: Ozon
  provider: ozon
- company: Avito
  provider: avito
- company: Sber
  provider: sber
- company: Alfa-Bank
  provider: alfabank
- company: Lamoda
  provider: lamoda
- company: Kuper
  provider: kuper
- company: Aviasales
  provider: aviasales
- company: Dodo
  provider: dodo
- company: DomClick
  provider: domclick
- company: MTS Link
  provider: mtslink
- company: T-Bank
  provider: tbank
- company: MTS
  provider: mts
- company: Wildberries
  provider: rwb

# Yandex selects host + language by board (one source, two variants).
- company: Yandex
  provider: yandex
  board: ru
- company: Yandex
  provider: yandex
  board: com
# Yandex Crowd: gig/support catalogue (crowd.yandex.ru), single-company boardless.
- company: Yandex Crowd
  provider: yandexcrowd
