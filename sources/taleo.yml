# taleo (Oracle Taleo Enterprise) boards. Provider is the filename; board =
# "<host>/<careersection>" (see internal/sources/taleo.go), e.g. valero.taleo.net/2.
# Taleo is session-bound: the adapter GETs the careersection to set the JSESSIONID and
# scrape its portal code, then POSTs searchjobs. Each board was validated live (searchjobs
# returned >0 jobs and descriptions decoded) before adding.
#
# Onboarding a tenant is manual: find its public careersection host + section (the one that
# renders a real Job Search page, not the recruiter login) — the section (a number like "2"
# or a name like "ex"/"naukri") is not guessable and varies per tenant. The section usually
# appears in the careersection link on the company's own careers page. Known dead ends (host
# is up but no keyless REST feed, do not re-try blindly): UnitedHealth (careersection now
# 302s to their Phenom site), Hilton (searchjobs returns totalCount=0 — feed walled), Praxair
# and A.T. Kearney (legacy joblist.ftl/moresearch.ftl skin with no inline portalNo). Large
# boards are fine: the adapter is a StreamingSource, so a slow detail fan-out (hyatt ~3.2k
# jobs, ~3.7min) persists incrementally rather than buffering — no per-board size ceiling.

