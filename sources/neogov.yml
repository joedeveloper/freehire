# neogov (NEOGOV governmentjobs.com / schooljobs.com) boards. Provider is the
# filename; board = "<domain>/<agency>" where domain is governmentjobs.com or its
# education vertical schooljobs.com (see internal/sources/neogov.go). NEOGOV is
# common among US public colleges and school districts (schooljobs.com is the
# education tenant space).
#
# Add a board only after validating it live: the listing endpoint
# (www.<domain>/careers/home/index?agency=<agency> with the
# X-Requested-With: XMLHttpRequest header) must return job cards. harvest-boards
# neogov <seed> does this automatically.

- company: Cochise College
  board: schooljobs.com/cochisecollege
