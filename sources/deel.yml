# deel (Deel ATS) career pages — jobs.deel.com/<orgSlug>. Provider is the filename;
# board = the org's URL slug (see internal/sources/deel.go). The board page is a
# server-rendered Next.js app that inlines the whole catalogue (titles + full HTML
# descriptions) in its flight payload, so one GET per board assembles every job with
# no per-posting detail request — no API key, no headless browser.
#
# Slugs are case- and punctuation-sensitive (e.g. Range, QMLCareers, zema.global), and
# two different orgs can share a stem (dott vs dott-1769520315673). Each board below was
# validated live: GET /<slug>/sitemap.xml returned an XML job list (a non-tenant slug
# returns an HTML shell, since the page itself always 200s). Expand by seeding more slugs
# (Google site:jobs.deel.com) and re-validating against the per-org sitemap.

