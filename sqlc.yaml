version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        rename:
          # Go initialism: column "url" -> field URL (not Url). JSON tag stays "url".
          url: "URL"
        overrides:
          # Read jobs.enrichment as json.RawMessage, not []byte. RawMessage keeps
          # the JSONB blob as raw bytes that marshal straight through to the API
          # response (an empty payload stays {}); a plain []byte would base64-encode.
          - column: "jobs.enrichment"
            go_type: "encoding/json.RawMessage"
          # Same reasoning for the profile's derived résumé analysis: keep the JSONB
          # blob as raw bytes that marshal straight through (nil → null), not base64.
          - column: "search_profiles.resume_analysis"
            go_type: "encoding/json.RawMessage"
