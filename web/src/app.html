<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <script>
      // No flash of the wrong theme: apply the persisted (or OS) choice before
      // first paint. Mirrors theme.svelte.ts; the toggle re-syncs on mount.
      (function () {
        try {
          var m = localStorage.getItem('hire.theme');
          var dark =
            m === 'dark' ||
            ((!m || m === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!-- Google Analytics (gtag.js). Skipped on localhost so dev traffic stays
    out of the property; the measurement ID is public by design. -->
    <script>
      (function () {
        if (/^(localhost|127\.0\.0\.1)$/.test(location.hostname)) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-6P1PZ719T0';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-6P1PZ719T0');
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
