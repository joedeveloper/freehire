<script>self.__next_f.push([1,"{\"@context\":\"https://schema.org/\",\"@type\":\"JobPosting\",\"title\":\"Open Source Contributor\",\"description\":\"\u003cp\u003e\u003cstrong\u003eRole Title:\u003c/strong\u003e Open Source Contributor\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRole Type:\u003c/strong\u003e Contractor\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLocation: \u003c/strong\u003eRemote\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003emicro1 is engaging Open Source Contributors to participate in a very complex and challenging Software Engineering project.\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\\\"background-color:transparent;color:rgb(29, 28, 29)\\\"\u003eAs an expert you will be creating Reinforcement Learning Environments which test and AI model’s ability to solve complex software engineering problems related to fixing code, creating features, refactoring code and optimizing performance. You will be tasked with creating a reproducible environment and golden reference solution for the problem.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eApplicants must have clear open source contributions and profiles to showcase it like GitHub or GitLab. (Preferrably with C++, Python, JAVA, GoLang, Typescript, or Rust)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScope of Work\u003c/strong\u003e\u003c/p\u003e\u003col\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eContribute production-quality code, reviews, and documentation to open-source repositories relevant to the customer’s project.\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eDesign, implement, and optimize complex algorithms and system components using one or more of the following languages: C++, Python, JAVA, GoLang, Typescript, or Rust.\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eIdentify and resolve technical challenges, bugs, and performance bottlenecks in existing codebases.\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eCollaborate with other contributors and stakeholders to align deliverables with project goals and best practices.\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eCreate, maintain, and enhance technical documentation to support knowledge sharing and onboarding.\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003eParticipate in code discussions and provide constructive feedback to elevate overall code quality.\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003e.\u003c/span\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003ePreferred Qualifications:\u003c/strong\u003e\u003c/p\u003e\u003col\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003ePrevious experience working on large-scale, distributed codebases.\u003c/span\u003e\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eFamiliarity with modern AI or machine learning systems is a plus, though not required.\u003c/span\u003e\u003c/li\u003e\u003cli data-list=\\\"bullet\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eBackground in participating in rigorous code reviews and contributing to the development of software best practices.\u003c/span\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eProcess:\u003c/strong\u003e\u003c/p\u003e\u003col\u003e\u003cli data-list=\\\"ordered\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eApply to the role, filling out the screening questions\u003c/span\u003e\u003c/li\u003e\u003cli data-list=\\\"ordered\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eComplete AI interview (aprox. 30 minutes)\u003c/span\u003e\u003c/li\u003e\u003cli data-list=\\\"ordered\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eTechnical Assessment (Tentative)\u003c/span\u003e\u003c/li\u003e\u003cli data-list=\\\"ordered\\\"\u003e\u003cspan class=\\\"ql-ui\\\" contenteditable=\\\"false\\\"\u003e\u003c/span\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eHiring Manager review\u003c/span\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eCompensation Structure\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eCompensation is output-based; experts are paid per task that meets the project specifications. The time required to complete work may vary depending on the expert’s experience and workflow. Minimum submission requirements apply. Experts must submit a minimum of tasks per week.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eStart Timeline \u0026amp; Availability\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\\\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\\\"\u003eWe typically fill roles within 48 hours and are looking for experts ready to jump in right away. If selected, we expect you to start your first tasks within 24–48 hours of completing onboarding.\u003c/span\u003e\u003c/p\u003e\",\"datePosted\":\"2026-07-16\",\"employmentType\":null,\"hiringOrganization\":{\"@type\":\"Organization\",\"name\":\"micro1\",\"sameAs\":\"https://micro1.ai\"},\"jobLocationType\":\"TELECOMMUTE\",\"workHours\":\"Flexible\",\"skills\":[\"Python3\",\"JAVA\",\"Rust\",\"Basics C++\",\"Typescript\",\"GoLang\"],\"directApply\":true,\"applicantLocationRequirements\":[{\"@type\":\"Country\",\"name\":\"Bangladesh\"},{\"@type\":\"Country\",\"name\":\"Hong Kong\"},{\"@type\":\"Country\",\"name\":\"India\"},{\"@type\":\"Country\",\"name\":\"Indonesia\"},{\"@type\":\"Country\",\"name\":\"Japan\"},{\"@type\":\"Country\",\"name\":\"Kazakhstan\"},{\"@type\":\"Country\",\"name\":\"Kyrgyzstan\"},{\"@type\":\"Country\",\"name\":\"Malaysia\"},{\"@type\":\"Country\",\"name\":\"Pakistan\"},{\"@type\":\"Country\",\"name\":\"Philippines\"},{\"@type\":\"Country\",\"name\":\"Singapore\"},{\"@type\":\"Country\",\"name\":\"Sri Lanka\"},{\"@type\":\"Country\",\"name\":\"Taiwan\"},{\"@type\":\"Country\",\"name\":\"Thailand\"},{\"@type\":\"Country\",\"name\":\"Uzbekistan\"},{\"@ty t submit a minimum of tasks per week.\u003c/span\u003e\u003c/p\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong style=\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\"\u003eStart Timeline \u0026amp; Availability\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cspan style=\"background-color:rgb(255, 255, 255);color:rgb(0, 0, 0)\"\u003eWe typically fill roles within 48 hours and are looking for experts ready to jump in right away. If selected, we expect you to start your first tasks within 24–48 hours of completing onboarding.\u003c/span\u003e\u003c/p\u003e"])</script>
