e91e4b\",\"title\":\"Senior Data Scientist - Credit Risk & Provisioning Models \",\"richtextDescription\":\"$2a\",\"applicationFormId\":\"0877b7a6-6b23-43b8-8002-f881005d4918\",\"isCompensationVisible\":true,\"createdAt\":\"2026-03-10T16:25:23.404Z\",\"updatedAt\":\"2026-03-10T16:27:31.295Z\",\"job\":{\"id\":\"8e42c02e-3074-428d-8e08-c99c2be91e4b\",\"jobEmploymentTypes\":[{\"id\":\"a2d4cb8c-3ba0-4137-a097-9539f07405b6\",\"employmentType\":{\"id\":\"62e0c8ef-78c9-4cc8-ae0a-2930c60b6271\",\"name\":\"Full-time\"}}],\"jobLocations\":[{\"id\":\"8883e3ae-9142-42b4-b9b5-8e707335142d\",\"location\":{\"id\":\"39d5aaa0-6e90-48e5-8c98-14c04a7c34ca\",\"name\":\"Stockholm\"}}],\"currentCompensation\":{\"id\":\"e6b7bb37-8406-4055-92e1-e939680a8711\",\"currencyIsoCode\":\"SEK\",\"minAmount\":611050,\"maxAmount\":843151},\"tags\":[],\"jobTeams\":[],\"jobDepartments\":[{\"id\":\"cd05be22-74c2-48cc-bfeb-82dea707ef8e\",\"department\":{\"id\":\"ae2801c1-dea4-4f1c-aaec-a00d678dd005\",\"name\":\"Engineering\"}}]},\"jobPostingPublications\":[{\"id\":\"a1dd6163-969d-4f90-83ed-cba886197f6e\",\"currentState\":{\"id\":\"4cad2338-8ee0-4bbc-9c01-329435c408b0\",\"stateSlug\":\"published_basic\",\"createdByHrisOrganizationUserId\":\"bc157dba-88c4-4c94-8cd8-ef2d184dd189\",\"errorMessage\":null,\"createdAt\":\"2026-03-10T16:26:05.147Z\"},\"jobBoard\":{\"id\":\"c12332fe-4f66-4d3e-9941-156ddeacf0dc\"}}]}],\"orgSlug\":\"klarna\"}]\n23:T1aef,<p></p><p><strong>About Us</strong></p><p>With over 111 million global active users and 2,9 million transactions per day, Klarna is on the way to becoming the world’s favorite way to shop. To help us get there, we’re assembling an unparalleled global talent team - accelerating individual careers and disrupting entire industries. We’re looking for people ready to achieve the extraordinary and embrace our bold ambitions as we shape the future of payments and fintech.&nbsp;</p><p>At Klarna, every interaction matters. We believe clear and confident communication is at the heart of building trust with our millions of users worldwide.</p><p></p><p><strong>Your Role</strong></p><p>This isn't just a customer-facing role. Alongside delivering exceptional experiences, you'll be expected to think critically and work with AI tools to generate structured recommendations that help Klarna continuously improve.</p><p></p><p>Whether you’re based in a vibrant city or a peaceful rural area, this opportunity is open to you anywhere in Sweden. Are you a Klarna user? Do you thrive on solving complex problems, shaping customer experiences, driving real change and passionate about interactions with customers?</p><p></p><p>Join Klarna’s specialized Customer Trust &amp; Experience team - where your insights don’t just help customers, they shape the future of our products and services. You are responsible for maintaining customer trust, handling technical/financial questions, work with Klarna’s success teams, identify opportunities to improve and set priorities.</p><p></p><p><strong>What You Will Do</strong></p><ul><li><p>Be the voice of Klarna.</p></li><li><p>Manage complex, high-friction cases end-to-end by clarifying situations, setting expectations and rebuilding trust.</p></li><li><p>Deliver <u>exceptional</u> customer experiences across phone, chat and email.</p></li><li><p>Proactively contact customers when issues are detected and take ownership before they escalate.</p></li><li><p>Use Klarna's leading AI tools to identify patterns, surface issues and produce structured improvement suggestions that drive real change across products and operations. Go beyond resolving cases, think critically, document recurring friction points and use AI assistants to turn your frontline experience into clear, actionable recommendations for the business.</p></li><li><p>Influence how we build trust, solve problems and continuously elevate Klarna’s service.</p></li><li><p>Work with Klarna’s leading AI tools and help refine them to enhance customer trust.</p></li></ul><p><strong>What We Offer</strong></p><ul><li><p><em>100% Flexibility:</em> Choose your working hours and location from anywhere in Sweden.</p></li><li><p><em>Competitive Compensation</em>: Earn from 400 SEK per hour (excl. VAT), with a bonus incentive program in the works that could significantly boost your overall earnings.</p></li><li><p><em>Empowerment and Impact: </em>You have full autonomy to take ownership of your work and shape processes that make a real difference. Your ideas and contributions will drive meaningful change.</p></li><li><p>While this is a flexible, freelance opportunity, we generally expect a <strong>minimum availability of around 100 hours per month*</strong> to ensure continuity and impact. For best results, we've found that consultants who dedicate at least <strong>25 hours per week</strong> tend to perform strongest and there's no upper cap, so taking on more (even full-time) is always welcome.</p><p></p><p><em>*During the first 2–3 weeks, onboarding requires a minimum of </em><strong><em>60 total hours (~20 hours per week)</em></strong><em> to build product knowledge, confidence, and independence. After this period, the role transitions into the flexible monthly setup described above.</em></p></li></ul><p><strong>Who You Are</strong></p><ul><li><p>A career professional with a background in tech, operations, finance or business who is looking for a flexible opportunity. Or, you are a senior level student (year 2+ in uni) currently pursuing a degree in engineering, business, economics, law, political science or similar.</p></li><li><p>Comfortable working in business English, with the ability to communicate clearly and professionally in a work setting.</p></li><li><p>Fluent (native or near-native) in one or more of the following languages:</p><ul><li><p>Swedish</p></li><li><p>Danish</p></li><li><p>Norwegian</p></li><li><p>Dutch</p></li><li><p>French</p></li><li><p>Finnish</p></li><li><p>German</p></li><li><p>Spanish</p></li><li><p>Italian</p></li><li><p>Polish</p></li><li><p>Portuguese</p></li><li><p>English (United Kingdom, Ireland, North America, ANZ, Canada)</p></li></ul></li><li><p>The right to work in the European Union and <u>located in Sweden</u>.</p></li><li><p>This is a freelance consultant role. You must be registered for F-skatt (Swedish tax status for self-employed) or be willing to obtain it in order to engage in this opportunity.</p></li><li><p>Confident problem-solver with strong communication skills, ready to challenge the status quo and improve Klarna’s products and routines.</p></li><li><p>Customer obsessed advocate who will go the extra mile for every single consumer.</p></li><li><p>A Klarna user who likes our bold ideas, big ambitions and is ready to help reshape the future of fintech.</p></li><li><p>Tech-savvy and interested in how AI can make problem-solving faster and smarter.&nbsp;</p></li><li><p>Organized and detail-oriented, with strong administrative skills to manage tasks efficiently and keep processes running smoothly.</p></li></ul><p><strong>Hardware and Network Requirements</strong></p><p>As this is a freelance role, you will need to provide your own work setup, including the following essential tools:</p><p></p><p>✓ A laptop or desktop (Windows 11 Pro or macOS 15 or newer) capable of running the latest version of Google Chrome. For security reasons, this device should only be used by you. (Incase you will use Windows, a Windows Pro version is a requirement)</p><p>✓ A reliable headset with a built-in microphone for clear communication.</p><p>✓ A stable and fast internet connection with at least 20 Mbit/s download speed, to support video calls and online collaboration without interruptions.</p><p></p><p><strong>Want the full picture first?</strong><br>Learn more about this consultant opportunity, how it works, and what success looks like at Klarna → go <a target=\"\" rel=\"noopener noreferrer\" class=\"link\" href=\"https://www.klarna.com/careers/prv/?pageId=r0ahWluDS5q3O5ZeEzObw\">here</a>!</p><hr><p><strong>Please include a CV in English.</strong></p><p>Curious to learn more about Klarna and what it’s like to work here? Explore <a target=\"_blank\" rel=\"noopener noreferrer\" class=\"link\" href=\"https://www.klarna.com/careers/\">https://www.klarna.com/careers/</a></p>2a:Tf61,<p><strong>           What You'll Do</strong></p><ul><li><p>Develop and maintain credit risk models for Probability of Default (PD), Loss Given Default (LGD), Exposure at Default (EAD), and lifetime Expected Credit Loss (ECL) across multiple regions and products.</p></li><li><p>Train gradient boosting models<strong> </strong>(LightGBM, XGBoost) for credit risk prediction with rigorous calibration, backtesting, and out-of-time validation.</p></li><li><p>Design and implement vectorized models for computing forward-looking lifetime ECL estimates, incorporating macroeconomic scenarios and discounting.</p></li><li><p>Perform feature engineering<strong> </strong>on credit datasets including payment behavior, delinquency patterns, bureau credit scores, and transactional features.</p></li><li><p>Manage the full model lifecycle using MLflow for experiment tracking, model versioning, and registry, ensuring reproducibility and complete audit trails.</p></li><li><p>Build and maintain model monitoring to track performance, stability, and drift across markets, producing dashboards and automated alerts.</p></li><li><p>Develop macro-overlay models<strong> </strong>that incorporate macroeconomic variables (unemployment, GDP, interest rates) into forward-looking credit loss projections.</p></li><li><p>Support fair value estimation and coverage rate analysis for debt sale pricing and capital management decisions.</p></li><li><p>Run end-of-month production scoring - loading trained models, scoring exposure data at scale on cloud compute, and validating ECL outputs.</p></li><li><p>Maintain model documentation and support audit reviews, regulatory inquiries, and model validation exercises.</p></li><li><p>Collaborate with Data Engineers to define feature requirements, validate pipeline outputs, and ensure model inputs are accurate and timely.</p></li><li><p>Present results to senior stakeholders including Finance leadership, auditors, and regulatory reviewers.</p><p><br><br><strong>Who you are</strong></p></li><li><p>3+ years of experience in a Data Science, Quantitative Analyst, or Credit Risk Modeling role.</p></li><li><p>Strong Python skills for modeling, analysis, and production code (pandas, NumPy, scikit-learn).</p></li><li><p>Experience with gradient boosting frameworks<strong> </strong>- LightGBM, XGBoost, or CatBoost.</p></li><li><p>Solid statistical foundations - probability theory, hypothesis testing, regression, time series, survival analysis, or transition matrices.</p></li><li><p>SQL proficiency - complex analytical queries on a data warehouse for feature extraction, validation, and ad-hoc analysis.</p></li><li><p>Model lifecycle experience - training, hyperparameter tuning, validation, deployment, and monitoring.</p></li><li><p>Experience with experiment tracking tools such as MLflow, Weights &amp; Biases, or similar.</p></li><li><p>Strong communication skills - ability to explain model behavior, limitations, and results to non-technical stakeholders.</p></li></ul><p><strong>            Awesome to have</strong></p><ul><li><p>Credit risk modeling experience - PD, LGD, EAD, transition matrices, vintage analysis, or roll-rate models.</p></li><li><p>IFRS 9 / CECL knowledge - staging criteria, lifetime vs. 12-month ECL, forward-looking adjustments, macroeconomic overlays.</p></li><li><p>Familiarity with model interpretability<strong> </strong>techniques (SHAP, feature importance, partial dependence plots).</p></li><li><p>Experience with Bayesian optimization for hyperparameter tuning.</p></li><li><p>Exposure to Numba or vectorized computation for high-performance model calculations.</p></li><li><p>Familiarity with fair value or pricing models for consumer credit portfolios.</p></li><li><p>Understanding of cloud infrastructure (AWS S3, Batch, Docker) for model deployment and scoring.</p></li><li><p>Background in fintech, banking, or consumer lending.</p></li></ul><p><br><br></p>"])</script></body></html>
