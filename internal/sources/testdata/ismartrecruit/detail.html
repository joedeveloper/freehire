			<meta property="og:description" content="Reference Number: 083-1007KV

Job Description: 

Our client is seeking an experienced On-Site Mining Engineer to support the delivery of a bankable feasibility study and advance an open pit copper project through FEED and construction readiness. Reporting to the Project Manager, the successful candidate will be responsible for open pit mine planning, design optimisation, technical studies, contractor readiness and site validation while working closely with multidisciplinary teams to ensure safe, practical and execution-ready mining solutions.

Responsibilities: 


	Develop and optimise open pit designs, pushbacks, haul roads, waste dumps and stockpiles.
	Prepare and maintain Life of Mine (LOM) schedules, pre-strip and early mining plans.
	Optimise strip ratios, mine sequencing, fleet selection and equipment productivity.
	Coordinate mine plans with geology, geotechnical, survey and processing teams.
	Develop drill and blast designs, fragmentation targets and material movement plans.
	Conduct field inspections to validate mine designs and reduce project risk.
	Support drilling, mapping, sampling and other site investigation programmes.
	Prepare pre-strip, starter pit and early mining plans for project execution.
	Assist with mining contractor strategy, tender documentation and bid evaluations.
	Maintain mining cost models, productivity assumptions and capital planning inputs.
	Perform mine planning studies to improve production and project economics.
	Ensure compliance with HSE, environmental and mining regulations in country.
	Support mobilisation planning, SOP development and operational readiness activities.
	Liaise with project teams, contractors, consultants and regulatory authorities.
	Prepare technical reports and planning deliverables for project execution. 


Qualifications, Experience &amp;amp; Competencies


	Bachelor&amp;#39;s Degree in Mining Engineering.
	Minimum 5-10 years&amp;#39; experience in open pit mining.
	Proven experience in open pit design and mine scheduling.
	Experience with drill &amp;amp; blast and load &amp;amp; haul optimisation.
	Exposure to FS, DFS or project development environments.
	Proficient in Deswik, MineSched, Datamine, Vulcan, Surpac or similar software.
	Advanced Excel skills for mine planning and cost modelling.
	Copper or base metals experience (preferred).
	Experience working with mining contractors (preferred).
	Valid driver&amp;#39;s licence.


Please visit www.mining-recruitment-jobs.com for more exciting opportunities. 

Kerrin van Schalkwyk
