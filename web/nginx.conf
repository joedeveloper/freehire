# nginx config for the freehire web container. nginx is the public face: it
# keeps the SvelteKit SSR app and the Go API same-origin (required for the
# SameSite=Lax auth cookie) by routing /api and /health to the backend and
# everything else to the in-container Node SSR server.
server {
    listen 80;

    # Security headers applied to every response. TLS is terminated upstream, so the
    # browser sees these over HTTPS. These are the non-breaking baseline; a script-src
    # CSP is configured in svelte.config.js (nonce-based) so it doesn't break SSR
    # hydration. `always` emits them on error responses too.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compress proxied text responses. The Go API returns JSON uncompressed (e.g. the
    # /stats/facets and /jobs/facets payloads run into tens of KB), and gzip cuts that
    # ~8x on the wire. `gzip_proxied any` lets nginx compress upstream responses; it
    # skips anything already Content-Encoding'd (the Node SSR HTML compresses itself),
    # so there is no double-compression. text/html is always gzipped when gzip is on.
    gzip on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain application/xml application/rss+xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Resolve the backend hostname at request time (Docker's embedded DNS), not at
    # startup — so the web container boots even if `app` is briefly down/unresolved
    # instead of nginx refusing to start. The literal Node upstream needs no resolver.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Backend service name inside the compose network.
    location /api/ {
        set $backend http://app:8080;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # The backend keys its rate limiter on X-Real-IP. nginx OVERWRITES it with the
        # real peer ($remote_addr), so a client cannot spoof it — unlike X-Forwarded-For,
        # which is a client-appendable list.
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /health {
        set $backend http://app:8080;
        proxy_pass $backend;
    }

    # The CLI install script (web/public/install.sh, copied into the image), served
    # by nginx as plain text so `curl -fsSL https://freehire.dev/install.sh | sh`
    # works and a browser can read it before piping to a shell. Kept on nginx so it
    # stays independent of the Node server.
    location = /install.sh {
        root /usr/share/nginx/html;
        default_type text/plain;
    }

    # Everything else → the SvelteKit Node SSR server (adapter-node) in this
    # container. X-Forwarded-* let adapter-node reconstruct the public origin.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # SvelteKit emits a large `Link: rel=modulepreload` response header that grows
        # with a page's module graph; some pages (e.g. company detail) exceed nginx's
        # default 4k proxy_buffer_size, which otherwise fails with 502 "upstream sent
        # too big header". Give the response-header buffer generous headroom.
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 16k;
    }
}
